<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Segellogbuch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f4c81">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header>
        <h1>⛵ Segellogbuch</h1>
        <p>Törns erfassen und verwalten</p>
    </header>

    <!-- Status -->
    <div id="status-msg" class="status-msg" hidden></div>

    <!-- Törnauswahl -->
    <div class="toern-bar">
        <select id="toern-select" aria-label="Törn auswählen">
            <option value="">— Törn auswählen —</option>
        </select>
        <button type="button" id="btn-neuer-toern" class="btn-primary">+ Neuer Törn</button>
        <button type="button" id="btn-neuer-log" class="btn-primary" hidden>📘 Log</button>
    </div>

    <!-- Törnübersicht -->
    <div id="toern-uebersicht"></div>

    <!-- Formular (erst sichtbar wenn Törn aktiv) -->
    <div id="form-section">

        <!-- Löschen -->
        <div class="delete-row">
            <button type="button" id="btn-toern-loeschen" class="btn-danger">Törn löschen</button>
        </div>

        <!-- Törn-Stammdaten -->
        <div class="card">
            <h2>📋 Törn-Stammdaten</h2>
            <div class="field-group">
                <div class="field">
                    <label for="fld-tripname">Törnname *</label>
                    <input type="text" id="fld-tripname" placeholder="z. B. Ostsee-Runde 2025">
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="fld-start-date">Startdatum</label>
                        <input type="date" id="fld-start-date">
                    </div>
                    <div class="field">
                        <label for="fld-start-time">Startzeit</label>
                        <input type="time" id="fld-start-time">
                    </div>
                </div>
                <div class="field">
                    <label for="fld-skipper">Schiffsführer *</label>
                    <input type="text" id="fld-skipper" placeholder="Vor- und Nachname">
                </div>
            </div>
        </div>

        <!-- Crew -->
        <div class="card">
            <h2>👥 Crew</h2>
            <div class="crew-add-row">
                <div class="field">
                    <label for="crew-input">Name</label>
                    <input type="text" id="crew-input" placeholder="Crew-Mitglied">
                </div>
                <div class="field field-role">
                    <label for="crew-role">Rolle</label>
                    <input type="text" id="crew-role" value="Crew" placeholder="Rolle">
                </div>
                <button type="button" id="btn-crew-add">+ Hinzufügen</button>
            </div>
            <ul id="crew-list"></ul>
        </div>

        <!-- Schiffsdaten -->
        <div class="card">
            <h2>⚓ Schiffsdaten</h2>
            <div class="field-group">
                <div class="field-row">
                    <div class="field">
                        <label for="fld-ship-name">Schiffsname</label>
                        <input type="text" id="fld-ship-name" placeholder="z. B. Albatros">
                    </div>
                    <div class="field">
                        <label for="fld-ship-type">Bootstyp</label>
                        <input type="text" id="fld-ship-type" placeholder="z. B. Bavaria 38">
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="fld-ship-reg">Kennzeichen</label>
                        <input type="text" id="fld-ship-reg" placeholder="z. B. WÜ-12345">
                    </div>
                    <div class="field">
                        <label for="fld-ship-engine">Motor</label>
                        <input type="text" id="fld-ship-engine" placeholder="z. B. Volvo 30 PS">
                    </div>
                </div>
            </div>
        </div>

        <!-- Notizen -->
        <div class="card">
            <h2>📝 Notizen</h2>
            <div class="field">
                <textarea id="fld-notes" placeholder="Freie Notizen zum Törn…" rows="4"></textarea>
            </div>
        </div>

        <!-- Logbucheintrag -->
        <div class="card" id="log-card">
            <h2>📘 Logbucheintrag</h2>

            <div class="event-add-row">
                <div class="field">
                    <label for="log_zeit">Zeit *</label>
                    <input type="datetime-local" id="log_zeit">
                </div>
                <div class="field">
                    <label for="log_typ">Typ</label>
                    <select id="log_typ">
                        <option>Abfahrt</option>
                        <option>Ankunft</option>
                        <option>Ankersetzen</option>
                        <option>Anker auf</option>
                        <option>Manöver</option>
                        <option>Segelwechsel</option>
                        <option>Reffen</option>
                        <option>Motorbetrieb</option>
                        <option>Wetterwechsel</option>
                        <option>Sichtung</option>
                        <option>Notfall</option>
                        <option>Sonstiges</option>
                    </select>
                </div>
            </div>

            <div class="event-add-row">
                <div class="field">
                    <label for="log_wind">Wind (Bft)</label>
                    <select id="log_wind">
                        <option value="">—</option>
                        <option>0</option><option>1</option><option>2</option>
                        <option>3</option><option>4</option><option>5</option>
                        <option>6</option><option>7</option><option>8</option>
                        <option>9</option><option>10</option><option>11</option><option>12</option>
                    </select>
                </div>
                <div class="field">
                    <label for="rudergaenger">Rudergänger</label>
                    <select id="rudergaenger">
                        <option value="">— Rudergänger —</option>
                    </select>
                </div>
            </div>

            <div class="field" style="margin-bottom: 10px;">
                <label for="log_text">Bemerkung</label>
                <input type="text" id="log_text" placeholder="Was ist passiert?">
            </div>

            <button type="button" id="btn-log-speichern" class="btn-secondary">+ Eintrag speichern</button>
        </div>

        <!-- Log-Liste -->
        <div id="log-liste"></div>

        <!-- Statistik -->
        <div id="toern-statistik"></div>

        <!-- Abschluss -->
        <div id="toern-abschluss"></div>

        <!-- Speichern -->
        <button type="button" id="btn-speichern" class="btn-save">💾 Törn speichern</button>
        <button type="button" id="btn-csv-export" class="btn-export">⬇ Export CSV</button>
        <button type="button" id="btn-json-export" class="btn-export">💾 Backup JSON</button>
        <button type="button" id="btn-drucken" class="btn-export">🖨 Drucken / PDF</button>
        <button type="button" id="btn-abschluss-druck" class="btn-export">📋 Törnabschluss / PDF</button>

    </div><!-- /form-section -->

    <!-- Versionszeile -->
    <div class="version-bar">
        <span id="version-label">v1.2.2 · von Al.Gether</span>
        <button type="button" id="btn-update" class="btn-update" hidden onclick="updateErzwingen()"></button>
    </div>

</div><!-- /app -->

<!-- Druckbereich (nur beim Drucken sichtbar) -->
<div id="druck-bereich"></div>
<div id="abschluss-druck-bereich"></div>

<script src="storage.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
autoUpdatePruefen();
</script>

</body>
</html>
